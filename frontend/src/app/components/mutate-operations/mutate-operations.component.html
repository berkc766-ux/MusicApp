<div class="mutate-container">
  <h2>Mutate Operations</h2>

  <!-- Requirement 3 -->
  <section class="card">
    <h3>3. Update a Song's Title</h3>
    <div class="form-group vertical">
      <input type="text" [(ngModel)]="updateSongId" placeholder="Enter Song ID (UUID)">
      <input type="text" [(ngModel)]="newSongTitle" placeholder="Enter New Title">
      <button class="btn-update" (click)="updateSong()">Update Song Name</button>
    </div>
    <div *ngIf="updateStatus" class="success">{{ updateStatus }}</div>
    <div *ngIf="updateError" class="error">{{ updateError }}</div>
  </section>

  <!-- Requirement 4 -->
  <section class="card">
    <h3>4. Add a New Artist</h3>
    <div class="form-group vertical">
      <input type="text" [(ngModel)]="newArtistStageName" placeholder="Stage Name (Required)">
      <input type="text" [(ngModel)]="newArtistRealName" placeholder="Real Name (Required)">
      <textarea [(ngModel)]="newArtistBio" placeholder="Biography (Optional)"></textarea>
      <button class="btn-insert" (click)="addArtist()">Add Artist</button>
    </div>
    <div *ngIf="addArtistStatus" class="success">{{ addArtistStatus }}</div>
    <div *ngIf="addArtistError" class="error">{{ addArtistError }}</div>
  </section>

  <!-- Requirement 5 -->
  <section class="card">
    <h3>5. Delete Album and Cascading Songs</h3>
    <div class="form-group">
      <input type="text" [(ngModel)]="deleteAlbumId" placeholder="Enter Album ID (UUID)">
      <button class="btn-delete" (click)="deleteAlbum()">Danger: Delete</button>
    </div>
    <div *ngIf="deleteStatus" class="success">{{ deleteStatus }}</div>
    <div *ngIf="deleteError" class="error">{{ deleteError }}</div>
  </section>
</div>
